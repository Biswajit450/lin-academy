<div id="screen-profile" class="app-screen space-y-6">
    <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 md:p-8 border border-slate-100 dark:border-slate-800 shadow-sm relative overflow-hidden">
        <div class="flex flex-col md:flex-row items-center md:items-start gap-6">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-brand-blue/20 overflow-hidden shrink-0 bg-slate-100 dark:bg-slate-800">
                <img id="profile-page-pic" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow text-center md:text-left space-y-2">
                <h2 id="profile-page-name" class="text-2xl md:text-3xl font-extrabold text-slate-900 dark:text-white font-serif">Loading...</h2>
                <p id="profile-page-email" class="text-sm text-slate-500 dark:text-slate-400 font-medium">Please login</p>
                
                <div class="flex items-center justify-center md:justify-start gap-3 mt-4">
                    <div id="profile-student-badges" class="flex gap-3">
                        <span id="profile-learner-badge" class="bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-full shadow-sm"><i class="fa-solid fa-seedling mr-1"></i> New Explorer</span>
                    </div>
                    <span id="profile-admin-badge" class="hidden bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400 text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-full border border-purple-200 dark:border-purple-800"><i class="fa-solid fa-shield-halved mr-1"></i> <span id="profile-role-text">Super Admin</span></span>
                </div>
            </div>
            <button onclick="window.handleLogout()" class="mt-4 md:mt-0 bg-rose-50 text-rose-600 hover:bg-rose-100 dark:bg-rose-900/20 dark:hover:bg-rose-900/40 border border-rose-200 dark:border-rose-800 px-5 py-2.5 rounded-xl font-bold transition-colors text-sm shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div id="profile-progress-section" class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4"><i class="fa-solid fa-chart-pie text-brand-blue mr-2"></i>My Progress Tracker</h3>
            <div class="space-y-4" id="profile-progress-list">
                <p class="text-xs text-slate-400">Loading progress...</p>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm h-full">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4"><i class="fa-solid fa-user-gear text-purple-500 mr-2"></i>Settings & Details</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Phone Number</label>
                    <input type="tel" id="profile-phone" placeholder="+91 98765 43210" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm outline-none dark:text-white">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">City / State</label>
                    <input type="text" id="profile-city" placeholder="e.g., New Delhi" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm outline-none dark:text-white">
                </div>
                <button onclick="window.saveProfileInfo()" class="w-full bg-slate-800 hover:bg-slate-700 text-white dark:bg-slate-700 dark:hover:bg-slate-600 text-sm font-bold py-2.5 rounded-lg transition-colors shadow-sm">Save Details</button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm">
        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4"><i class="fa-solid fa-circle-info text-amber-500 mr-2"></i>Support & Legal</h3>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4">
            <button onclick="window.openSupportMail()" class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-950 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 transition-colors gap-2">
                <i class="fa-solid fa-envelope text-2xl text-brand-blue"></i><span class="text-xs font-bold text-slate-600 dark:text-slate-300">Help & Support</span>
            </button>
            <button onclick="window.openPolicyPage('privacy_policy', 'Privacy Policy')" class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-950 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 transition-colors gap-2">
                <i class="fa-solid fa-user-shield text-2xl text-emerald-500"></i><span class="text-xs font-bold text-slate-600 dark:text-slate-300">Privacy Policy</span>
            </button>
            <button onclick="window.openPolicyPage('terms_conditions', 'Terms & Conditions')" class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-950 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 transition-colors gap-2">
                <i class="fa-solid fa-file-contract text-2xl text-slate-500"></i><span class="text-xs font-bold text-slate-600 dark:text-slate-300">T&C</span>
            </button>
            <button onclick="window.openPolicyPage('refund_policy', 'Refund Policy')" class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-950 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 transition-colors gap-2">
                <i class="fa-solid fa-money-bill-transfer text-2xl text-rose-500"></i><span class="text-xs font-bold text-slate-600 dark:text-slate-300">Refund Policy</span>
            </button>
            <button onclick="window.openPolicyPage('about_us', 'About Us')" class="flex flex-col items-center justify-center p-4 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-950 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-700 transition-colors gap-2">
                <i class="fa-solid fa-building text-2xl text-purple-500"></i><span class="text-xs font-bold text-slate-600 dark:text-slate-300">About Us</span>
            </button>
        </div>
    </div>
    
    <div class="text-center pb-4 pt-2">
        <button onclick="alert('This will permanently delete your account and remove all your enrollments. Please contact support via WhatsApp to initiate this request.')" class="text-xs text-slate-400 hover:text-rose-500 font-bold transition-colors underline">Delete My Account</button>
    </div>
</div>
